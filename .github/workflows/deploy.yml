name: Deploy FastAPI Microservice
on:
  push:
    branches: [ main ]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Lambda Dependencies
        run: |
          cd src/backend/products
          pip install -r requirements.txt -t .
          
      - name: Setup Node.js (for CDK)
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install CDK and Deploy
        run: |
          npm install
          npx cdk deploy userMicroService --require-approval never
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ap-south-1
